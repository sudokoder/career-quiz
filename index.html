<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Career Stream</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --progress-bg: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 600px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 40px;
            border: 1px solid var(--border);
        }

        .header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0f172a;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #334155;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background: var(--card-bg);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            text-align: left;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #eff6ff;
        }

        /* Results Styling */
        .results-title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .top-match-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .top-match-stream {
            font-size: 28px;
            font-weight: 800;
            color: #166534;
            margin: 5px 0;
        }

        .chart-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .chart-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chart-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }

        .chart-bar-bg {
            background: var(--progress-bg);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
        }

        .chart-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            border-radius: 6px;
            transition: width 1s ease-out;
        }

        .restart-btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }

        .restart-btn:hover {
            background: var(--primary-hover);
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <!-- Header/Progress Section -->
    <div class="header" id="quiz-header">
        <h1 id="progress-title">Loading Quiz...</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Dynamic Steps Placeholder -->
    <div id="dynamic-steps"></div>

    <!-- Results Section -->
    <div id="results-section" class="step">
        <h2 class="results-title">Your Best Career Path</h2>
        <div class="top-match-box">
            <div style="font-size: 14px; color: #15803d; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Your Strongest Match</div>
            <div class="top-match-stream" id="top-stream-name">Technology & Science</div>
            <p id="top-stream-desc" style="color: #166534; font-size: 14px; margin-top: 8px;"></p>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 12px; color: #334155;">Your score for each career path:</h3>
        <div class="chart-container" id="chart-container"></div>

        <button class="restart-btn" onclick="restartQuiz()">Start Over</button>
    </div>
</div>

<script>
    // Simplified stream names and descriptions
    const STREAMS = {
        tech: { 
            name: "Technology, Science & Engineering", 
            desc: "This path is perfect for people who love computers, coding, robots, solving math puzzles, or building new gadgets." 
        },
        medical: { 
            name: "Medicine & Healthcare", 
            desc: "This path is great for people who want to help sick patients, work in hospitals, cure diseases, or study how the human body works." 
        },
        commerce: { 
            name: "Business, Finance & Management", 
            desc: "This path is ideal for people who want to run a business, manage money, plan projects, lead teams, or work in a corporate office." 
        },
        legal: { 
            name: "Law & Justice", 
            desc: "This path is for people who love debating, writing down strong arguments, helping people find justice, or working with rules and laws." 
        },
        agriculture: { 
            name: "Agriculture & Nature", 
            desc: "This path is for people who care about plants, animals, farming, protecting nature, and growing healthy food." 
        }
    };

    // Simplified questions in plain English
    const QUESTIONS = [
        {
            text: "When you see a big problem in the world, what is the best way to solve it?",
            options: [
                { text: "Build a computer tool, write code, or make a machine to fix it.", stream: "tech" },
                { text: "Find out how it affects people's health and try to save lives.", stream: "medical" },
                { text: "Manage the money, organize the workers, and plan how to run the project.", stream: "commerce" },
                { text: "Create fair rules or laws so everyone behaves correctly.", stream: "legal" },
                { text: "Look at how it affects nature, the trees, water, and our food supply.", stream: "agriculture" }
            ]
        },
        {
            text: "Where would you feel happiest working every single day?",
            options: [
                { text: "In a tech lab, writing code, or working with computers.", stream: "tech" },
                { text: "In a clinic, dental office, or hospital helping patients.", stream: "medical" },
                { text: "In a modern office building, managing business deals or accounts.", stream: "commerce" },
                { text: "In a boardroom, law firm, or courtroom working with legal papers.", stream: "legal" },
                { text: "Outdoors in nature, on a farm, or in a plant biology laboratory.", stream: "agriculture" }
            ]
        },
        {
            text: "Which of these skills would you most like to learn or use?",
            options: [
                { text: "Solving hard math puzzles, building apps, or fixing computer systems.", stream: "tech" },
                { text: "Caring for sick people, studying health, and diagnosing illnesses.", stream: "medical" },
                { text: "Leading a team, making business deals, and learning how to invest money.", stream: "commerce" },
                { text: "Debating logically, writing strong arguments, and analyzing rules.", stream: "legal" },
                { text: "Protecting the environment, growing crops, and managing forests.", stream: "agriculture" }
            ]
        },
        {
            text: "How long do you want to study before you start working and earning money?",
            options: [
                { text: "I want to study for 4 years and get a well-paid job in technology quickly.", stream: "tech" },
                { text: "I am happy to study for a long time (5 to 9 years) to become a specialized doctor or therapist.", stream: "medical" },
                { text: "I want a business degree where I can work as an intern and earn a salary while studying.", stream: "commerce" },
                { text: "I want to join a 5-year law program right after school so I can start working in law firms.", stream: "legal" },
                { text: "I want a practical degree that quickly prepares me to work in nature or the food industry.", stream: "agriculture" }
            ]
        },
        {
            text: "If you had to read an interesting article this weekend, which topic would you choose?",
            options: [
                { text: "How robots and Artificial Intelligence (AI) are changing our future.", stream: "tech" },
                { text: "New discoveries in medicine, healthcare, and brain science.", stream: "medical" },
                { text: "How major startup companies make money and grow into massive brands.", stream: "commerce" },
                { text: "How cyber laws protect our personal information from online hackers.", stream: "legal" },
                { text: "How smart farming and new biology tools are saving our environment and food.", stream: "agriculture" }
            ]
        }
    ];

    let currentStep = 0;
    let scores = { tech: 0, medical: 0, commerce: 0, legal: 0, agriculture: 0 };

    function initQuiz() {
        const stepsContainer = document.getElementById('dynamic-steps');
        stepsContainer.innerHTML = '';
        
        QUESTIONS.forEach((q, qIdx) => {
            let stepDiv = document.createElement('div');
            stepDiv.className = `step ${qIdx === 0 ? 'active' : ''}`;
            stepDiv.id = `step-${qIdx}`;
            
            let qText = document.createElement('div');
            qText.className = 'question-text';
            qText.innerText = q.text;
            stepDiv.appendChild(qText);
            
            let optsList = document.createElement('div');
            optsList.className = 'options-list';
            
            q.options.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => handleAnswer(qIdx, opt.stream);
                optsList.appendChild(btn);
            });
            
            stepDiv.appendChild(optsList);
            stepsContainer.appendChild(stepDiv);
        });
        updateHeader();
    }

    function updateHeader() {
        if (currentStep < QUESTIONS.length) {
            document.getElementById('progress-title').innerText = `Question ${currentStep + 1} of ${QUESTIONS.length}`;
            let pct = (currentStep / QUESTIONS.length) * 100;
            document.getElementById('progress-bar').style.width = `${pct}%`;
        } else {
            document.getElementById('quiz-header').style.display = 'none';
        }
    }

    function handleAnswer(qIdx, selectedStream) {
        scores[selectedStream]++;
        
        document.getElementById(`step-${currentStep}`).classList.remove('active');
        currentStep++;
        
        if (currentStep < QUESTIONS.length) {
            document.getElementById(`step-${currentStep}`).classList.add('active');
            updateHeader();
        } else {
            updateHeader();
            showResults();
        }
    }

    function showResults() {
        document.getElementById('results-section').classList.add('active');
        
        // Find top matching stream
        let topStreamKey = 'tech';
        let maxScore = -1;
        for (let key in scores) {
            if (scores[key] > maxScore) {
                maxScore = scores[key];
                topStreamKey = key;
            }
        }
        
        document.getElementById('top-stream-name').innerText = STREAMS[topStreamKey].name;
        document.getElementById('top-stream-desc').innerText = STREAMS[topStreamKey].desc;

        // Render chart bars
        const chartContainer = document.getElementById('chart-container');
        chartContainer.innerHTML = '';
        
        for (let key in scores) {
            let pct = Math.round((scores[key] / QUESTIONS.length) * 100);
            
            let row = document.createElement('div');
            row.className = 'chart-row';
            
            let labelRow = document.createElement('div');
            labelRow.className = 'chart-label-row';
            labelRow.innerHTML = `<span>${STREAMS[key].name}</span><span>${pct}%</span>`;
            
            let barBg = document.createElement('div');
            barBg.className = 'chart-bar-bg';
            
            let barFill = document.createElement('div');
            barFill.className = 'chart-bar-fill';
            if(key === topStreamKey) barFill.style.background = '#16a34a'; // Green accent for the winning category
            
            barBg.appendChild(barFill);
            row.appendChild(labelRow);
            row.appendChild(barBg);
            chartContainer.appendChild(row);
            
            // Trigger bar animation
            setTimeout(() => { barFill.style.width = `${pct}%`; }, 50);
        }
    }

    function restartQuiz() {
        currentStep = 0;
        scores = { tech: 0, medical: 0, commerce: 0, legal: 0, agriculture: 0 };
        document.getElementById('results-section').classList.remove('active');
        document.getElementById('quiz-header').style.display = 'block';
        initQuiz();
    }

    window.onload = initQuiz;
</script>
</body>
</html>
